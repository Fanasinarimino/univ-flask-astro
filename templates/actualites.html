{% extends "base.html" %}
{% block content %}

<div class="container fade-in">
    <h2 class="mb-4 neon-text">Actualités Astronomiques (NASA)</h2>

    <div class="card card-astro p-4">

        <h3 class="mb-3">{{ data.title }}</h3>

        {% if data.url %}
            <img src="{{ data.url }}" class="img-fluid rounded mb-3 card-img-top">
        {% endif %}

        <p>{{ data.explanation }}</p>

        <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Retour</a>
    </div>
</div>

{% endblock %}
